    <link href="styles/myStyle.css" rel="stylesheet" />

    <!-- Scripts -->
    <script src="jScripts/JavaScript.js" type="text/javascript">  </script>
</head>
<body>
<div id="container">

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="img/k-glow-logo.png" alt="K-glow Logo" class="ourLogo">
            </a>
        <nav>
            <ul>
                <li><a href="index.html">דף הבית</a></li>
                <li><a href="about.html">אודות</a></li>
                <li><a href="diagnostic.html">אבחון עור</a></li>
                <li><a href="contactUs.html" class="active">צור קשר</a></li>
                <li><a href="siteMap.html">מפת האתר</a></li>
            </ul>
        </nav>
    </header>

    <div class="breadcrumb">
        <a href="index.html">דף הבית</a> &gt; <span>צור קשר</span>
    </div>

    <main>
        <section class="contact-section">
            <h1>צור קשר</h1>

            <div class="form-container">
                <p class="form-intro">נשמח לשמוע מכן! מלאו את הפרטים ונחזור אליכן בהקדם.</p>

                <form action="#" method="POST">

                    <div class="form-group">
                        <label for="fullName">שם מלא <span class="required-star">*</span></label>
                        <input type="text" id="fullName" name="fullName" placeholder="הקלידי את שמך המלא" required>
                    </div>

                    <div class="form-group">
                        <label for="userEmail">כתובת אימייל <span class="required-star">*</span></label>
                        <input type="email" id="userEmail" name="userEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="userPhone">מספר טלפון</label>
                        <input type="tel" id="userPhone" name="userPhone" placeholder="05X-XXXXXXX">
                    </div>

                    <div class="form-group">
                        <label for="interest">נושא הפנייה <span class="required-star">*</span></label>
                        <select id="interest" name="interest" required>
                            <option value="" disabled selected>בחרי נושא...</option>
                            <option value="recommendation">בקשת המלצה על מוצר</option>
                            <option value="cooperation">שיתוף פעולה</option>
                            <option value="feedback">משוב על האתר</option>
                            <option value="other">אחר</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="userMessage">תוכן ההודעה <span class="required-star">*</span></label> <br/>
                        <textarea id="userMessage" name="userMessage" rows="5" placeholder="כתבי לנו כאן את הודעתך..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">שליחת הודעה</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p> 2026 K-GLOW - כל הזכויות שמורות לנעה והדר | הפקולטה לטכנולוגיות למידה, HIT</p>
        <img src="img/logo-hit.png" alt="לוגו HIT - המכון הטכנולוגי חולון" class="college-logo">
    </footer>

</div>
</body>
</html>
