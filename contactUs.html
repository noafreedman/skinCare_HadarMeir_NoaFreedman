<body>
<div id="container">

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="img/k-glow-logo.png" alt="K-glow Logo" class="ourLogo">
            </a>
        <nav>
            <ul>

        </div>

    <div class="breadcrumb">
        <a href="index.html">דף הבית</a> &gt; <span>צור קשר</span>
    </div>

    <main>
        <section class="contactUsForm">
            <h1>צור קשר</h1>

                <p>נשמח לשמוע מכן! מלאו את הפרטים ונחזור אליכן בהקדם.</p>
                <p>שדות המסומנים בכוכבית (*) הם שדות חובה!</p>

                <form>
                        <label for="fullName">
                            שם מלא 
                            <span class="required">*</span>
                        <input type="text" id="fullName" placeholder="הקלידי את שמך המלא" required>
                        </label><br/>
                    
                        <label for="userEmail">
                            כתובת מייל 
                            <span class="required">*</span>
                        <input type="email" id="userEmail" placeholder="name@example.com" required>
                        </label><br/>
                        <label for="userPhone">
                            מספר טלפון
                            <span class="required">*</span>
                        <input type="tel" id="userPhone" placeholder="05X-XXXXXXX">

                    </label><br/>

                        <label for="issue">
                            נושא הפנייה 
                            <span class="required">*</span>
                        <select id="issue" required>
                            <option value="2" selected>בקשת המלצה על מוצר</option>
                            <option value="3">שיתוף פעולה</option>
                            <option value="4">משוב על האתר</option>
                            <option value="5">אחר</option>
                        </select>
                    </label><br/>
                    

                        <label for="userMessage">תוכן ההודעה <span class="required">*</span>
                            
                        <textarea id="userMessage" rows="5" placeholder="כתבי כאן את גוף ההודעה"></textarea>
                        </label><br/>
                    <input type="button" value="שליחה">

                </form>
        </section>
    </main>

    <footer>
        <p> 2026 K-GLOW - כל הזכויות שמורות לנעה והדר | הפקולטה לטכנולוגיות למידה, HIT</p>
        <img src="img/logo-hit.png" alt="לוגו HIT - המכון הטכנולוגי חולון" class="college-logo">
    </footer>

</body>
